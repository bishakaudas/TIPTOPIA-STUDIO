<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Details</title>

<link rel="stylesheet" href="Details.css">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<section class="product">

<div class="product-container">

<div class="image">

<img src="Details.jpg" alt="Cappuccino Nails">

</div>

<div class="details">

<h1>Cappuccino</h1>

<p class="description">
A 10-piece handmade press-on nail set with glue, nail file, cuticle stick, and adhesive tabs. Reusable, lightweight, and salon-quality.
</p>

<div class="price">

<span class="new-price">Rs.2000</span>

<span class="old-price">Rs.2300</span>

<span class="save">Save Rs.300</span>

</div>

<div class="rating">

★★★★★
<span>5.0/5</span>

</div>

<p class="stock">
<i class="fa-solid fa-circle-check"></i>
In Stock
</p>

<p class="shipping">
🚚 Free Shipping Available
</p>

<div class="buttons">

<button class="cart">
<i class="fa-solid fa-cart-shopping"></i>
Add to Cart
</button>

<button class="buy">
Buy Now
</button>

<button class="wish">
<i class="fa-regular fa-heart"></i>
Wishlist
</button>

</div>

</div>

</div>

</section>

<script src="Details.js"></script>

</body>
