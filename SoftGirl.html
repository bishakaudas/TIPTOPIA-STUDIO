<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tiptopia Studio - Nail Collection</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="SoftGirl.css" />
    <link rel="stylesheet" href="SoftGirl.js" />
</head>
<body>

  <main class="collection-section">
    <div class="container">
      <div class="nail-grid">

       
        <div class="nail-card">
          <div class="image-box">
            <img src="Cute1.webp" alt="Twilight Touch nails">
          </div>
          <h3>Bluesa </h3>
           <div class="rating">
            <span class="stars">★★★★☆</span>
            <span class="review-count">(5)</span>
            <p class="price">Rs.1300</p>
          </div>
        </div>

        
        <div class="nail-card">
          <div class="image-box">
            <img src="Cute2.jpg" alt="Vitamin Sea nails">
          </div>
          <h3>Cheery Boom</h3>
           <div class="rating">
            <span class="stars">★★★☆☆</span>
            <span class="review-count">(3)</span>
            <p class="price">Rs.1500</p>
          </div>
        </div>

        <!-- Card 3 (active like screenshot) -->
        <div class="nail-card active">
          <div class="image-box">
            <img src="Cute3.jpg" alt="Lush Green nails">
          </div>
          
          <h3> Polka Pop</h3>

           <div class="rating">
            <span class="stars">★★★★★</span>
            <span class="review-count">(5)</span>
            <p class="price">Rs. 1600</p>
          </div>
        </div>

         <div class="nail-card">
          <div class="image-box">
            <img src="Cute4.webp" alt="Honolulu nails">
          </div>

          <h3>Candy Kiss</h3>

           <div class="rating">
            <span class="stars">★★★★☆</span>
            <span class="review-count">(4)</span> 
            <p class="price">Rs.2000</p>
          </div>

        </div>

        <!-- Card 5 -->
        <div class="nail-card">
          <div class="image-box">
            <img src="Cute5.webp" alt="Sunset Kiss nails">
          </div>
          <h3> Breezy </h3>
           <div class="rating">
            <span class="stars">★★★★☆</span>
            <span class="review-count">(4)</span>
            <p class="price">Rs.2000</p>
          </div>
        </div>

        <!-- Card 6 -->
        <div class="nail-card">
          <div class="image-box">
            <img src="Cute6.jpg" alt="Cappuccino nails">
          </div>
          <h3> Sparkle</h3>
           <div class="rating">
            <span class="stars">★★★☆☆</span>
            <span class="review-count">(3)</span>
            <p class="price">Rs.2000</p>

        </div>

        <!-- Card 7 -->
        <div class="nail-card">
          <div class="image-box">
            <img src="Cute7.webp" alt="Spiced Bloom nails">

          <h3>   Lush Green</h3>
           <div class="rating">
            <span class="stars">★★★★★</span>
            <span class="review-count">(5)</span>
            <p class="price">Rs.2000</p>
          </div>
        </div>

        <!-- Card 8 -->
        <div class="nail-card">
          <div class="image-box">
            <img src="Cute8.webp" alt="Eldorado nails">
          </div>
          <h3>  Sparkle</h3>
           <div class="rating">
