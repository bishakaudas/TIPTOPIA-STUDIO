<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tiptopia Studio - Nail Collection</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="StarGirl.css" />
    <link rel="stylesheet" href="StarGirl.js"/>
</head>
<body>

  <main class="collection-section">
    <div class="container">
      <div class="nail-grid">

       
        <div class="nail-card">
          <div class="image-box">
            <img src="Star1.jpg" alt="Twilight Touch nails">
          </div>
          <h3> Ally </h3>
           <div class="rating">
            <span class="stars">★★★★☆</span>
            <span class="review-count">(5)</span>
            <p class="price">Rs.1500</p>
          </div>
        </div>

        
        <div class="nail-card">
          <div class="image-box">
            <img src="Star2.jpg" alt="Vitamin Sea nails">
          </div>
          <h3> Safari</h3>
           <div class="rating">
            <span class="stars">★★★☆☆</span>
            <span class="review-count">(3)</span>
            <p class="price">Rs.1800</p>
          </div>
        </div>

        <!-- Card 3 (active like screenshot) -->
        <div class="nail-card active">
          <div class="image-box">
            <img src="Star3.jpg" alt="Lush Green nails">
          </div>
          
          <h3>Iconic </h3>

           <div class="rating">
            <span class="stars">★★★★★</span>
            <span class="review-count">(5)</span>
            <p class="price">Rs.2000</p>
          </div>
        </div>

         <div class="nail-card">
          <div class="image-box">
            <img src="Star4.webp" alt="Honolulu nails">
          </div>

          <h3> Cherry</h3>

           <div class="rating">
            <span class="stars">★★★★☆</span>
            <span class="review-count">(4)</span>
            <p class="price">Rs.2000</p>
          </div>

        </div>

        <!-- Card 5 -->
        <div class="nail-card">
          <div class="image-box">
            <img src="Star5.webp" alt="Sunset Kiss nails">
          </div>
          <h3> Hot Girl</h3>
           <div class="rating">
            <span class="stars">★★★★☆</span>
            <span class="review-count">(4)</span>
              <p class="price">Rs.1400</p>
          </div>
        </div>

        <!-- Card 6 -->
        <div class="nail-card">
          <div class="image-box">
            <img src="Star6.jpg" alt="Cappuccino nails">
          </div>
          <h3> Starry </h3>
           <div class="rating">
            <span class="stars">★★★☆☆</span>
            <span class="review-count">(3)</span>
            <p class="price">Rs.1500</p>
          </div>
        </div>

        <!-- Card 7 -->
        <div class="nail-card">
          <div class="image-box">
            <img src="Star7.webp" alt="Spiced Bloom nails">
          </div>
          <h3> Brow Feline  </h3>
           <div class="rating">
            <span class="stars">★★★★★</span>
            <span class="review-count">(5)</span>
            <p class="price">Rs.2000</p>
          </div>
        </div>

        <!-- Card 8 -->
        <div class="nail-card">
          <div class="image-box">
            <img src="Star8.webp" alt="Eldorado nails">
            <p class="price">Rs.1800</p>
          </div>
          <h3> Wild and Free</h3>
           <div class="rating">
            <span class="stars">★★★★★</span>
            <span class="review-count">(5)</span>
            <p class="price">Rs.2000</p>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script src="StarGirl.js"></script>
</body>
</html>
