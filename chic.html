<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tiptopia Studio - Nail Collection</title>

  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="Chic.css" />
  <link rel="stylesheet" href="Chic.js" />
</head>
<body>

  <main class="collection-section">
    <div class="container">
      <div class="nail-grid">

       
        <div class="nail-card">
          <div class="image-box">
            <img src="Chic1.jpg" alt="Twilight Touch nails">
            
          </div>
          <h3>Lucid Dream </h3>
          
           <div class="rating">
            <span class="stars">★★★★☆</span>
            <span class="review-count">(5)</span>
            <p class="price">Rs.2000</p>
          </div>
        </div>

        
        <div class="nail-card">
          <div class="image-box">
            <img src="Chic2.jpg" alt="Vitamin Sea nails">
          </div>
          <h3>Lost in Paradise </h3>
           <div class="rating">
            <span class="stars">★★★☆☆</span>
            <span class="review-count">(3)</span>
            <p class="price">Rs.2500</p>
          </div>
        </div>

        
        <div class="nail-card active">
          <div class="image-box">
            <img src="Chic3.jpeg" alt="Lush Green nails">
          </div>
          
          <h3>For Night </h3>

           <div class="rating">
            <span class="stars">★★★★★</span>
            <span class="review-count">(5)</span>
            <p class="price">Rs.2600</p>
          </div>
        </div>

         <div class="nail-card">
          <div class="image-box">
            <img src="Chic4.webp" alt="Honolulu nails">
          </div>

          <h3> Eldorado </h3>

           <div class="rating">
            <span class="stars">★★★★☆</span>
            <span class="review-count">(4)</span>
            <p class="price">Rs.2300</p>
          </div>

        </div>

        
        <div class="nail-card">
          <div class="image-box">
            <img src="Chic5.jpg" alt="Sunset Kiss nails">
          </div>
          <h3>Fallen Angel </h3>
           <div class="rating">
            <span class="stars">★★★★☆</span>
            <span class="review-count">(4)</span>
            <p class="price">Rs.2200</p>
          </div>
        </div>

     
        <div class="nail-card">
          <div class="image-box">
            <img src="Chic6.jpg" alt="Cappuccino nails">
          </div>
          <h3>Aurora's Touch </h3>
           <div class="rating">
            <span class="stars">★★★☆☆</span>
            <span class="review-count">(3)</span>
            <p class="price">Rs.2000</p>
          </div>
        </div>

         
        <div class="nail-card">
          <div class="image-box">
            <img src="Chic7.jpg" alt="Spiced Bloom nails">
          </div>
          <h3> Coco </h3>
           <div class="rating">
            <span class="stars">★★★★★</span>
            <span class="review-count">(5)</span>
            <p class="price">Rs.2000</p>
            
          </div>
        </div>

    
        <div class="nail-card">
          <div class="image-box">
            <img src="Chic8.jpg" alt="Eldorado nails">
          </div>
          
          <h3> Amber Whisper </h3>
           <div class="rating">
            <span class="stars">★★★★★</span>
            <span class="review-count">(5)</span>
            <p class="price">Rs.2100</p>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
